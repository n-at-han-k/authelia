---
name: Container Image

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: container-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Push (linux/amd64)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      # Publish only when the image is "ready": default branch, a version tag,
      # or a manual run. Feature-branch pushes build only (verification).
      PUSH: >-
        ${{ github.event_name == 'workflow_dispatch'
        || github.ref == 'refs/heads/master'
        || startsWith(github.ref, 'refs/tags/') }}
      LDFLAGS_EXTRA: >-
        -X github.com/authelia/authelia/v4/internal/utils.BuildTag=${{ github.ref_name }}
        -X github.com/authelia/authelia/v4/internal/utils.BuildCommit=${{ github.sha }}
        -X github.com/authelia/authelia/v4/internal/utils.BuildBranch=${{ github.ref_name }}
        -X github.com/authelia/authelia/v4/internal/utils.BuildNumber=${{ github.run_number }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4.2.0

      - name: Log in to GHCR
        if: env.PUSH == 'true'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302  # v6.2.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7.3.0
        with:
          context: .
          file: Dockerfile.webfork
          platforms: linux/amd64
          push: ${{ env.PUSH }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            LDFLAGS_EXTRA=${{ env.LDFLAGS_EXTRA }}
...
